<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory MCP Server - Authorized</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #333;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    padding: 40px 36px 32px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .checkmark {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #ecfdf5;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .checkmark svg {
    width: 28px;
    height: 28px;
    stroke: #16a34a;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .card h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .card p {
    font-size: 14px;
    color: #666;
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .card p.hint {
    font-size: 13px;
    color: #999;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="checkmark">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Authorization Successful</h1>
  <p>You have been authorized. Returning to the application...</p>
  <p class="hint">If this page doesn't redirect automatically, you can safely close this window.</p>
</div>
<script>
  (function() {
    var url = {{.RedirectURL}};
    // Try to close the window first (works if opened by the app)
    window.close();
    // If still open after 2s, redirect
    setTimeout(function() { window.location.href = url; }, 2000);
  })();
</script>
</body>
</html>
